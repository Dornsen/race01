<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRI - Grand Admin Palace</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1115; color: #e1e7ed; margin: 0; padding: 0; }
        .header { background: #161b22; padding: 20px; text-align: center; border-bottom: 2px solid #e50914; }
        .header h1 { margin: 0; font-size: 24px; color: #fff; letter-spacing: 2px; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .tab-btn { padding: 12px 30px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .tab-btn.active { background: #e50914; color: #fff; border-color: #e50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); }
        .admin-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 0 20px 40px 20px; gap: 30px; }
        .panel-form { width: 35%; background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 8px; height: fit-content; position: sticky; top: 20px; }
        .panel-view { width: 65%; background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 8px; }
        h3 { margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; color: #fff; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; color: #8b949e; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { padding: 10px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 5px; font-size: 14px; }
        .form-group input:focus, .form-group textarea:focus { border-color: #e50914; outline: none; }
        .btn-submit { background: #238636; color: #fff; width: 100%; padding: 12px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-submit:hover { background: #2ea043; }
        .btn-cancel { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; width: 100%; padding: 8px; margin-top: 8px; border-radius: 6px; cursor: pointer; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-item { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .card-item img { max-width: 100%; height: 140px; object-fit: contain; border-radius: 6px; background: #1f242c; padding: 5px; }
        .card-item h4 { margin: 10px 0 5px 0; color: #fff; }
        .card-item .meta { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
        .card-item .stats { font-weight: bold; color: #ffca28; font-size: 14px; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; justify-content: center; }
        .btn-edit { background: #f59e0b; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #dc2626; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .checkbox-row { flex-direction: row; align-items: center; gap: 10px; margin-top: 5px; }
        .news-preview { margin-top: 14px; border: 1px solid #30363d; border-radius: 8px; padding: 10px; background: #0d1117; }
        .news-preview-card { border: 1px solid rgba(196, 164, 108, 0.22); border-radius: 8px; min-height: 190px; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; background: linear-gradient(135deg, rgba(106, 23, 17, 0.75), rgba(16, 18, 25, 0.9)); }
        .news-preview-chip { display: inline-flex; align-self: flex-start; border-radius: 999px; padding: 3px 8px; font-size: 11px; border: 1px solid rgba(255, 127, 80, 0.35); background: rgba(195, 34, 58, 0.24); }
        .news-preview-title { font-size: 22px; margin: 0; color: #fff; text-transform: uppercase; }
        .news-preview-body { margin: 0; color: #d0cbb5; }
        .news-preview-btn { width: auto; margin-top: 6px; padding: 8px 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KIRI MYTHOLOGY - DEV CONTROL PALACE</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('cards', event)">⛩️ Card Balancing & Management</button>
        <button class="tab-btn" onclick="switchTab('frames', event)">🖼️ Avatar Frames Store</button>
        <button class="tab-btn" onclick="switchTab('emotes', event)">🎭 Emotes</button>
        <button class="tab-btn" onclick="switchTab('news', event)">📰 Lobby News</button>
    </div>

    <div class="admin-layout">
        <div class="panel-form">
            <h3 id="form-title">Create New Card</h3>
            <form id="main-admin-form" onsubmit="processFormSubmit(event)">
                <input type="hidden" id="item-id">
                <div id="form-fields-wrapper"></div>
                <button type="submit" class="btn-submit">Execute Assets Sync</button>
                <button type="button" id="cancel-btn" class="btn-cancel" style="display:none;" onclick="clearForm()">Cancel Edit Mode</button>
            </form>
        </div>

        <div class="panel-view">
            <h3 id="view-title">Cards In Current Build</h3>
            <div class="grid-container" id="data-grid"></div>
        </div>
    </div>

    <script>
        let currentTab = 'cards';
        let serverDataCache = [];
        let isEditMode = false;

        const uiConfig = {
            cards: {
                formTitle: 'Add New Mythical Card',
                viewTitle: 'Cards Database In Realtime',
                fields: [
                    { id: 'name', label: 'Card Unique Name', type: 'text', required: true },
                    { id: 'clan', label: 'Clan / Faction', type: 'text', required: true },
                    { id: 'rarity', label: 'Rarity Tier', type: 'select', options: ['common', 'rare', 'epic', 'legendary'] },
                    { id: 'attack', label: 'Attack Power', type: 'number', required: true },
                    { id: 'defense', label: 'Defense Points', type: 'number', required: true },
                    { id: 'cost', label: 'Energy/Mana Cost', type: 'number', required: true },
                    { id: 'avatar_url', label: 'Asset Path (Image URL)', type: 'text', required: true, val: 'assets/cards/' },
                    { id: 'ability_code', label: 'Ability Trigger Code', type: 'text', required: true },
                    { id: 'is_basic', label: 'Is Starter/Basic Card?', type: 'checkbox', val: false },
                    { id: 'description', label: 'Flavor Lore Text', type: 'textarea', required: true },
                    { id: 'ability_description', label: 'Ability Mechanics Text', type: 'textarea', required: true }
                ]
            },
            frames: {
                formTitle: 'Release New Frame Variant',
                viewTitle: 'Active Store Frame Shells',
                fields: [
                    { id: 'id', label: 'Frame String ID (e.g. 7frame)', type: 'text', required: true, disableOnEdit: true },
                    { id: 'name', label: 'Visual Frame Name', type: 'text', required: true },
                    { id: 'price', label: 'In-Game Gold Price', type: 'number', required: true },
                    { id: 'image_url', label: 'Asset Image URL Path', type: 'text', required: true, val: '/assets/avatar_frames/' }
                ]
            },
            emotes: {
                formTitle: 'Create / Edit Emote',
                viewTitle: 'Emotes Catalog',
                fields: [
                    { id: 'id', label: 'Emote ID', type: 'text', required: false, disableOnEdit: true },
                    { id: 'name', label: 'Emote Name', type: 'text', required: true },
                    { id: 'file_name', label: 'File Name (assets/emotes/...)', type: 'text', required: false, val: 'assets/emotes/' },
                    { id: 'file', label: 'Upload File', type: 'file', required: false },
                    { id: 'price', label: 'Shop Price (optional)', type: 'number', required: false }
                ]
            },
            news: {
                formTitle: 'Create Lobby News',
                viewTitle: 'Lobby News & Banner Queue',
                fields: [
                    { id: 'title', label: 'Headline', type: 'text', required: true },
                    { id: 'body', label: 'News Description', type: 'textarea', required: true },
                    { id: 'chip', label: 'Chip Label', type: 'text', required: false, val: 'Update' },
                    { id: 'cta_text', label: 'CTA Button Text', type: 'text', required: false, val: 'Open' },
                    { id: 'cta_target', label: 'CTA Target Screen', type: 'select', options: ['', 'quests', 'gacha', 'shop', 'leaderboard', 'deck-builder'], optionLabels: ['None', 'Quests', 'Omamori', 'Shop', 'Leaderboard', 'Deck Builder'] },
                    { id: 'background_type', label: 'Background Type', type: 'select', options: ['gradient', 'image'] },
                    { id: 'background_value', label: 'Background Value (CSS gradient or image url/path)', type: 'textarea', required: true, val: 'linear-gradient(135deg, rgba(106, 23, 17, 0.75), rgba(16, 18, 25, 0.9))' },
                    { id: 'background_file', label: 'Upload Background Image', type: 'file', required: false },
                    { id: 'status', label: 'Status', type: 'select', options: ['draft', 'published', 'archived'] },
                    { id: 'is_active', label: 'Active In Rotation?', type: 'checkbox', val: true },
                    { id: 'sort_order', label: 'Sort Order', type: 'number', required: false, val: 1 },
                    { id: 'publish_from', label: 'Publish From', type: 'datetime-local', required: false },
                    { id: 'publish_to', label: 'Publish To', type: 'datetime-local', required: false }
                ]
            }
        };

        function switchTab(tabName, ev) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
            if (ev && ev.target) ev.target.classList.add('active');
            clearForm();
            buildFormInputs();
            fetchSystemData();
        }

        function formatDateTimeLocal(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            const pad = (n) => `${n}`.padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function buildFormInputs() {
            const container = document.getElementById('form-fields-wrapper');
            container.innerHTML = '';

            uiConfig[currentTab].fields.forEach((f) => {
                let html = `<div class="form-group ${f.type === 'checkbox' ? 'checkbox-row' : ''}">`;
                if (f.type !== 'checkbox' && f.type !== 'file') html += `<label for="inp-${f.id}">${f.label}</label>`;

                if (f.type === 'select') {
                    html += `<select id="inp-${f.id}">`;
                    f.options.forEach((opt, idx) => {
                        const label = f.optionLabels && f.optionLabels[idx] ? f.optionLabels[idx] : `${opt}`.toUpperCase();
                        html += `<option value="${opt}">${label}</option>`;
                    });
                    html += `</select>`;
                } else if (f.type === 'textarea') {
                    html += `<textarea id="inp-${f.id}" rows="3" ${f.required ? 'required' : ''}>${f.val || ''}</textarea>`;
                } else if (f.type === 'file') {
                    html += `<input type="file" id="inp-${f.id}">`;
                } else if (f.type === 'checkbox') {
                    html += `<input type="checkbox" id="inp-${f.id}" ${f.val ? 'checked' : ''}> <label for="inp-${f.id}">${f.label}</label>`;
                } else {
                    html += `<input type="${f.type}" id="inp-${f.id}" value="${f.val || ''}" ${f.required ? 'required' : ''}>`;
                }

                html += `</div>`;
                container.innerHTML += html;
            });

            if (currentTab === 'news') {
                container.innerHTML += `
                    <div class="news-preview">
                        <div style="font-size:12px;color:#8b949e;margin-bottom:8px;">Live Preview</div>
                        <div id="news-preview-card" class="news-preview-card">
                            <span id="news-preview-chip" class="news-preview-chip">Update</span>
                            <h4 id="news-preview-title" class="news-preview-title">News headline</h4>
                            <p id="news-preview-body" class="news-preview-body">News body text...</p>
                            <button id="news-preview-btn" type="button" class="news-preview-btn">Open</button>
                        </div>
                    </div>
                `;
                attachNewsPreviewListeners();
                updateNewsPreview();
            }
        }

        function attachNewsPreviewListeners() {
            ['title', 'body', 'chip', 'cta_text', 'background_type', 'background_value'].forEach((id) => {
                const el = document.getElementById(`inp-${id}`);
                if (el) el.addEventListener('input', updateNewsPreview);
            });
        }

        function updateNewsPreview() {
            const card = document.getElementById('news-preview-card');
            if (!card) return;

            const title = document.getElementById('inp-title');
            const body = document.getElementById('inp-body');
            const chip = document.getElementById('inp-chip');
            const ctaText = document.getElementById('inp-cta_text');
            const bgType = document.getElementById('inp-background_type');
            const bgValue = document.getElementById('inp-background_value');

            document.getElementById('news-preview-title').innerText = (title && title.value.trim()) || 'News headline';
            document.getElementById('news-preview-body').innerText = (body && body.value.trim()) || 'News body text...';
            document.getElementById('news-preview-chip').innerText = (chip && chip.value.trim()) || 'Update';

            const btn = document.getElementById('news-preview-btn');
            btn.innerText = (ctaText && ctaText.value.trim()) || 'Open';
            btn.style.display = ctaText && ctaText.value.trim() ? 'inline-block' : 'none';

            const value = (bgValue && bgValue.value.trim()) || '';
            if (bgType && bgType.value === 'image') {
                const imageUrl = value.startsWith('url(') ? value : `url('${value}')`;
                card.style.background = `linear-gradient(180deg, rgba(10, 11, 16, 0.35), rgba(10, 11, 16, 0.72)), ${imageUrl}`;
                card.style.backgroundSize = 'cover';
                card.style.backgroundPosition = 'center';
            } else {
                card.style.background = value || 'linear-gradient(135deg, rgba(106, 23, 17, 0.75), rgba(16, 18, 25, 0.9))';
            }
        }

        async function fetchSystemData() {
            document.getElementById('view-title').innerText = uiConfig[currentTab].viewTitle;
            const res = await fetch(`/api/admin/${currentTab}`);

            if (res.status === 401 || res.status === 403) {
                alert('🔴 Access Denied: Unauthorized admin signature.');
                window.location.href = '/lobby.html';
                return;
            }

            serverDataCache = await res.json();
            const grid = document.getElementById('data-grid');
            grid.innerHTML = '';

            serverDataCache.forEach((item, index) => {
                let node = `<div class="card-item" onclick="triggerEditMode('${item.id}')">`;

                if (currentTab === 'cards') {
                    node += `
                        <img src="${item.avatar_url}" onerror="this.src='assets/card_back.png'">
                        <h4>${item.name}</h4>
                        <div class="meta">${item.clan} | ${item.rarity.toUpperCase()}</div>
                        <div class="stats">⚔️ ${item.attack} | 🛡️ ${item.defense} | 💎 ${item.cost}</div>
                    `;
                } else if (currentTab === 'emotes') {
                    node += `
                        <img src="assets/emotes/${item.file_name}" style="height:100px; object-fit:contain;">
                        <h4>${item.name}</h4>
                        <div class="meta">ID: ${item.id}</div>
                        <div class="stats">💰 ${(item.price || '—')}</div>
                    `;
                } else if (currentTab === 'frames') {
                    node += `
                        <img src="${item.image_url}" style="height:100px; object-fit:contain;">
                        <h4>${item.name}</h4>
                        <div class="meta">ID: ${item.id}</div>
                        <div class="stats">💰 ${item.price} Gold</div>
                    `;
                } else if (currentTab === 'news') {
                    const bg = item.background_type === 'image'
                        ? `linear-gradient(180deg, rgba(10, 11, 16, 0.35), rgba(10, 11, 16, 0.72)), url('${item.background_value}')`
                        : item.background_value;

                    node += `
                        <div style="height:100px;border-radius:6px;border:1px solid #30363d;background:${bg};background-size:cover;background-position:center;"></div>
                        <h4>${item.title}</h4>
                        <div class="meta">#${item.sort_order} | ${item.status.toUpperCase()} | ${item.is_active ? 'ACTIVE' : 'OFF'}</div>
                        <div class="meta">${item.publish_from ? ('FROM: ' + new Date(item.publish_from).toLocaleString()) : 'FROM: NOW'} | ${item.publish_to ? ('TO: ' + new Date(item.publish_to).toLocaleString()) : 'TO: ∞'}</div>
                        <div class="stats">👁️ ${item.impressions} | 🖱️ ${item.clicks} | CTR ${item.ctr}%</div>
                    `;
                }

                node += '<div class="actions">';
                node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerEditMode('${item.id}')">✏️</button>`;
                node += `<button class="btn-delete" onclick="event.stopPropagation(); triggerDelete('${item.id}')">❌</button>`;

                if (currentTab === 'emotes') {
                    node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerGrant('${item.id}')">🎁</button>`;
                }

                if (currentTab === 'news') {
                    node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerCloneNews('${item.id}')">⧉</button>`;
                    node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerToggleNews('${item.id}')">${item.is_active ? '⏸' : '▶'}</button>`;
                    node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerMoveNews('${item.id}', -1)">↑</button>`;
                    node += `<button class="btn-edit" onclick="event.stopPropagation(); triggerMoveNews('${item.id}', 1)">↓</button>`;
                }

                node += '</div></div>';
                grid.innerHTML += node;
            });
        }

        async function processFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('item-id').value;
            const payload = id ? { id } : {};

            if (currentTab === 'frames') payload.isNewFrame = !isEditMode;

            if (currentTab === 'emotes') {
                const fileInput = document.getElementById('inp-file');
                const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
                if (hasFile) {
                    const file = fileInput.files[0];
                    const base64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onerror = () => reject('File read error');
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });

                    const payloadUpload = {
                        name: document.getElementById('inp-name') ? document.getElementById('inp-name').value : file.name,
                        file_name: file.name,
                        price: document.getElementById('inp-price') ? document.getElementById('inp-price').value : '',
                        data: base64
                    };

                    const uploadRes = await fetch('/api/admin/emotes/upload-base64', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadUpload)
                    });
                    if (uploadRes.ok) {
                        clearForm();
                        fetchSystemData();
                        return;
                    }
                    alert('🔴 Upload failed');
                    return;
                }
            }

            uiConfig[currentTab].fields.forEach((f) => {
                const element = document.getElementById(`inp-${f.id}`);
                if (!element) return;
                payload[f.id] = f.type === 'checkbox' ? element.checked : element.value;
            });

            // If a background image file was provided for news, upload it first and set background_value
            if (currentTab === 'news') {
                const fileInput = document.getElementById('inp-background_file');
                const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
                if (hasFile) {
                    const file = fileInput.files[0];
                    const base64 = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onerror = () => reject('File read error');
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });

                    const uploadRes = await fetch('/api/admin/news/upload-image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file_name: file.name, data: base64 })
                    });

                    if (uploadRes.ok) {
                        const up = await uploadRes.json().catch(() => ({}));
                        if (up && up.file) payload.background_value = up.file;
                        payload.background_type = 'image';
                    } else {
                        alert('🔴 Background image upload failed');
                        return;
                    }
                }
            }

            if (currentTab === 'news') {
                payload.sort_order = Number(payload.sort_order || 0);
                payload.publish_from = payload.publish_from || null;
                payload.publish_to = payload.publish_to || null;
            }

            const res = await fetch(`/api/admin/${currentTab}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                clearForm();
                fetchSystemData();
            } else {
                const data = await res.json().catch(() => ({}));
                alert(`🔴 ${data.error || 'Error executing update.'}`);
            }
        }

        function triggerEditMode(id) {
            isEditMode = true;
            const item = serverDataCache.find((i) => String(i.id) === String(id));
            if (!item) return;

            document.getElementById('item-id').value = item.id;
            document.getElementById('form-title').innerText = `Editing ID: ${item.id}`;
            document.getElementById('cancel-btn').style.display = 'block';

            uiConfig[currentTab].fields.forEach((f) => {
                const element = document.getElementById(`inp-${f.id}`);
                if (!element) return;

                if (f.type === 'checkbox') {
                    element.checked = !!item[f.id];
                } else if (f.type === 'datetime-local') {
                    element.value = formatDateTimeLocal(item[f.id]);
                } else {
                    element.value = item[f.id] ?? '';
                }

                if (f.disableOnEdit) element.disabled = true;
            });

            if (currentTab === 'news') updateNewsPreview();
        }

        async function triggerDelete(id) {
            if (!confirm('💥 Purge this asset permanently from database records?')) return;
            const res = await fetch(`/api/admin/${currentTab}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                fetchSystemData();
                if (document.getElementById('item-id').value === String(id)) clearForm();
            } else {
                alert('🔴 Deletion failed.');
            }
        }

        async function triggerGrant(id) {
            if (!confirm('Grant this emote to ALL users?')) return;
            const res = await fetch(`/api/admin/emotes/grant/${id}`, { method: 'POST' });
            if (res.ok) alert('✅ Emote granted to all users.');
            else alert('🔴 Grant failed.');
        }

        async function triggerToggleNews(id) {
            const res = await fetch(`/api/admin/news/${id}/toggle`, { method: 'PATCH' });
            if (res.ok) fetchSystemData();
            else alert('🔴 Failed to toggle news.');
        }

        async function triggerCloneNews(id) {
            const res = await fetch(`/api/admin/news/${id}/clone`, { method: 'POST' });
            if (res.ok) fetchSystemData();
            else alert('🔴 Failed to clone news.');
        }

        async function triggerMoveNews(id, direction) {
            const idx = serverDataCache.findIndex((item) => String(item.id) === String(id));
            if (idx < 0) return;

            const target = idx + direction;
            if (target < 0 || target >= serverDataCache.length) return;

            const reordered = serverDataCache.map((n) => n.id);
            const tmp = reordered[idx];
            reordered[idx] = reordered[target];
            reordered[target] = tmp;

            const res = await fetch('/api/admin/news/reorder', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderedIds: reordered })
            });

            if (res.ok) fetchSystemData();
            else alert('🔴 Failed to reorder news.');
        }

        function clearForm() {
            isEditMode = false;
            document.getElementById('item-id').value = '';
            document.getElementById('form-title').innerText = uiConfig[currentTab].formTitle;
            document.getElementById('cancel-btn').style.display = 'none';

            uiConfig[currentTab].fields.forEach((f) => {
                const element = document.getElementById(`inp-${f.id}`);
                if (!element) return;

                if (f.type === 'checkbox') {
                    element.checked = !!f.val;
                } else {
                    element.value = f.val || '';
                }

                if (f.disableOnEdit) element.disabled = false;
            });

            if (currentTab === 'news') updateNewsPreview();
        }

        buildFormInputs();
        fetchSystemData();
    </script>
</body>
</html>
