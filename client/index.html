<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Battle Arena - Auth</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div id="login-box" class="auth-box">
            <h2>Marvel Arena Login</h2>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Assemble!</button>
            </form>
            <p><a href="#" id="show-forgot">Forgot Password?</a></p>
            <p>New Hero? <a href="#" id="show-register">Register here</a></p>
        </div>

        <div id="register-box" class="auth-box hidden">
            <h2>Join the Initiative</h2>
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit">Create Account</button>
            </form>
            <p>Already a member? <a href="#" id="show-login">Back to Login</a></p>
        </div>

        <div id="verify-box" class="auth-box hidden">
            <h2>Verify Identity</h2>
            <p>Check your email for the 6-digit code.</p>
            <form id="verify-form">
                <input type="hidden" id="verify-email">
                <input type="text" id="verify-code" placeholder="6-digit Code" maxlength="6" required>
                <button type="submit">Verify & Get Starter Deck</button>
            </form>
        </div>

        <div id="forgot-box" class="auth-box hidden">
            <h2>Request Intel</h2>
            <p>Enter your email to receive a reset token.</p>
            <form id="forgot-form">
                <input type="email" id="forgot-email" placeholder="Hero Email" required>
                <button type="submit">Send Reset Token</button>
            </form>
            <p><a href="#" class="back-to-login-link">Back to Login</a></p>
        </div>

        <div id="reset-box" class="auth-box hidden">
            <h2>New Credentials</h2>
            <form id="reset-form">
                <input type="hidden" id="reset-email-hidden">
                <input type="text" id="reset-token" placeholder="Reset Token" required>
                <input type="password" id="reset-new-password" placeholder="New Password" required>
                <button type="submit">Reset Password</button>
            </form>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
